[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 5000
  metric_buffer_limit = 20000
  collection_jitter = "0s" 
  flush_interval = "10s"
  flush_jitter = "5s"
  debug = false
  quiet = false       
  logfile = "/var/log/telegraf/telegraf.log"
  hostname = "telegraf"         
  omit_hostname = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["${MQTT_TOPIC}"]
  client_id = "telegraf-mqtt"
  connection_timeout = "30s"
  qos = 0

  data_format = "json"
  json_query = ""  
  json_time_key = "tx_time_ms_epoch"
  json_time_format = "unix_ms"
  json_string_fields  = ["source_address"]
  tag_keys = ['data_state']                           


[[processors.starlark]]
  source = '''
def apply(metric):
    if "source_address" in metric.fields:
        metric.fields["source_address"] = str(int(metric.fields["source_address"]))
    return metric
'''

[[processors.starlark]]
  source = '''
def apply(metric):
    if "source_address" in metric.fields:
        metric.fields["source_address"] = str(int(metric.fields["source_address"]))

    if "topic" in metric.tags:
        metric.tags.pop("topic")

    fields_to_rename = [k for k in metric.fields.keys() if k.startswith("data_")]
    for old_key in fields_to_rename:
        new_key = old_key[len("data_"):]
        metric.fields[new_key] = metric.fields.pop(old_key)

    tags_to_rename = [k for k in metric.tags.keys() if k.startswith("data_")]
    for old_key in tags_to_rename:
        new_key = old_key[len("data_"):]
        metric.tags[new_key] = metric.tags.pop(old_key)


    if "data" in metric.fields:
        data_value = metric.fields.pop("data")
        if type(data_value) == dict:
            for k, v in data_value.items():
                metric.fields[k] = v
        elif type(data_value) == list:
            metric.fields["neighbors_list"] = data_value
            
    sid = int(metric.fields.get("sensor_id", -1))

    if sid == 112:
        metric.name = "sensor_temperature"
        temp = metric.fields.pop("temperature", None)
        if temp != None:
            metric.fields["temperature"] = temp 

    if sid == 125:
        metric.name = "sensor_button"
        metric.fields["button"] = int(metric.fields.get("button", 0))


    elif sid == 114:
        metric.name = "sensor_humidity"
        hum = metric.fields.pop("humidity", None)
        if hum != None:
            metric.fields["humidity"] = hum

    elif sid == 127:
        metric.name = "sensor_motion"

        if "state" in metric.fields:
            metric.fields["state"] = str(metric.fields["state"])

        metric.fields["move_duration"] = int(metric.fields.get("move_duration", 0))
        metric.fields["move_number"] = int(metric.fields.get("move_number", 0))
        metric.fields["x_axis"] = int(metric.fields.get("x_axis", 0))
        metric.fields["y_axis"] = int(metric.fields.get("y_axis", 0))
        metric.fields["z_axis"] = int(metric.fields.get("z_axis", 0))
        print("DEBUG: 127")
        print("DEBUG: Payload reçu - ", metric)

    elif sid == 193:
        metric.name = "sensor_neighbors_count"
        neighbors_count = metric.fields.pop("neighbors", None)
        if neighbors_count != None:
            metric.fields["neighbors"] = int(neighbors_count)
        print("DEBUG: Payload reçu - ", metric)


    elif sid == 192:
        neighbors = []

        for i in range(0, 10):  # max 10 voisins
            key_addr = str(i) + "_address"
            key_rssi = str(i) + "_rssi"
            key_tx   = str(i) + "_tx_power"

            if not (key_addr in metric.fields or key_rssi in metric.fields or key_tx in metric.fields):
                break

            val_addr = metric.fields.get(key_addr, None)
            val_rssi = metric.fields.get(key_rssi, None)
            val_tx   = metric.fields.get(key_tx, None)

            if val_addr == None and val_rssi == None and val_tx == None:
                break

            neighbor = {}

            if val_addr != None:
                neighbor["address"] = str(int(metric.fields.pop(key_addr)))
            else:
                neighbor["address"] = ""

            if val_rssi != None:
                neighbor["rssi"] = int(metric.fields.pop(key_rssi))
            else:
                neighbor["rssi"] = 0

            if val_tx != None:
                neighbor["tx_power"] = int(metric.fields.pop(key_tx))
            else:
                neighbor["tx_power"] = 0

            neighbors.append(neighbor)
            print("DEBUG: Voisin", i, neighbor)

        metrics = []
        for j in range(0, len(neighbors)):
            neighbor = neighbors[j]

            new_metric = Metric("sensor_neighbors_detail")
            new_metric.time = metric.time
            new_metric.tags["host"] = metric.tags.get("host", "") 

            new_metric.fields["sensor_id"] = metric.fields.get("sensor_id", -1)
            new_metric.fields["source_address"] = metric.fields.get("source_address", "")
            new_metric.fields["event_id"] = metric.fields.get("event_id", -1)

            new_metric.fields["neighbor_address"] = neighbor["address"]
            new_metric.fields["rssi"] = neighbor["rssi"]
            new_metric.fields["tx_power"] = neighbor["tx_power"]

            metrics.append(new_metric)

        print("DEBUG: Total métriques générées :", len(metrics))
        return metrics

        metrics = []
        for j in range(0, len(neighbors)):
            neighbor = neighbors[j]
            m = metric.copy()
            m.name = "sensor_neighbors_detail"

            m.fields["neighbor_address"] = neighbor["address"]
            m.fields["rssi"] = neighbor["rssi"]
            m.fields["tx_power"] = neighbor["tx_power"]

            allowed_fields = [
                "sensor_id",
                "source_address",
                "event_id",
                "neighbor_address",
                "rssi",
                "tx_power"
            ]
            cleaned_fields = {}
            for k in allowed_fields:
                if k in m.fields:
                    cleaned_fields[k] = m.fields[k]
            m.fields = cleaned_fields

            m.time = metric.time
            metrics.append(m)

        print("DEBUG: Total métriques générées :", len(metrics))
        return metrics


    elif sid == 116:
        metric.name = "sensor_pressure"
        pressure = metric.fields.pop("atmospheric_pressure", None)
        if pressure != None:
            metric.fields["atmospheric_pressure"] = int(pressure)

    elif sid == 142:
        metric.name = "sensor_voltage"
        voltage = metric.fields.pop("voltage", None)
        if voltage != None:
            metric.fields["voltage"] = voltage

    else:
        return metric

    return metric
'''

# Sortie PostgreSQL
[[outputs.postgresql]]
  connection = "host=${POSTGRES_HOST} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_RECORD_DB} sslmode=disable"
  tags_as_foreign_keys = false