services:
  postgres:
    image:  timescale/timescaledb:latest-pg17
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    restart: always
    env_file:
      - .env
      - .env.local
    networks:
      - postgres_net
    ports:
      - "${POSTGRES_EXT_PORT}:5432"
    volumes:
      - ./postgres/initdb:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      retries: 5
  
  watcher:
    container_name: ${WATCHER_CONTAINER_NAME:-watcher}
    build:
      context: ./watcher
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backup/metabase:/backup
    env_file:
      - .env
      - .env.local
    command: ["/bin/sh", "-c", "sleep 15 && /entrypoint.sh"]
    depends_on:
      - postgres
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: ${PGADMIN_CONTAINER_NAME:-pgamdin}
    restart: always
    env_file:
      - .env
      - .env.local
    ports:
      - "${PGADMIN_EXT_PORT:-80}:80"
    user: root
    entrypoint: /bin/sh -c "chmod 600 /pgadmin4/pgpass; /entrypoint.sh;"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./backup:/var/lib/pgadmin/storage
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpass:/pgadmin4/pgpass
    networks:
      postgres_net:
    depends_on:
      - postgres

  metabase:
    container_name: ${METABASE_CONTAINER_NAME}
    image: metabase/metabase:latest
    ports:
      - "${METABASE_EXT_PORT}:${METABASE_INT_PORT}"
    env_file:
      - .env
      - .env.local
    networks:
      - postgres_net
    healthcheck:
      test: curl --fail -I http://localhost:${METABASE_INT_PORT}/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres

  telegraf:
    image: telegraf:1.35
    container_name: ${TELEGRAF_CONTAINER_NAME:-telegraf}
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_RECORD_DB: ${POSTGRES_RECORD_DB:-recorded}
      MQTT_HOST: ${MQTT_HOST:-176.186.143.117}
      MQTT_PORT: ${MQTT_PORT:-8828}
      MQTT_TOPIC: ${MQTT_TOPIC:-pws-packet/#}
    env_file:
      - .env
      - .env.local
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postgres_net
    healthcheck:
      test: ["CMD", "telegraf", "--test"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  postgres_net:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  metabase_data: 
